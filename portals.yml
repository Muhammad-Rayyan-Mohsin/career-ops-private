# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # User's target roles — UAE focus, AI/ML/agentic/full-stack-AI
    - "AI"
    - "ML"
    - "LLM"
    - "Agent"
    - "Agentic"
    - "GenAI"
    - "Generative AI"
    - "NLP"
    - "LLMOps"
    - "MLOps"
    - "Computer Vision"
    - "Voice AI"
    - "Conversational AI"
    - "RAG"
    # -- Engineering roles --
    - "Software Engineer"
    - "Backend Engineer"
    - "Full-Stack"
    - "Full Stack"
    - "Platform Engineer"
    - "Solutions Architect"
    - "Solutions Engineer"
    - "Forward Deployed"
    - "Deployed Engineer"
    - "Customer Engineer"
    - "Integration Engineer"
    - "Applied AI"
    - "Applied Scientist"
    # -- Automation / Growth eng --
    - "Automation"
    - "GTM Engineer"
    - "Growth Engineer"
    - "Internal Tools"
    # -- Junior level OK (final-year undergrad) --
    - "Junior AI"
    - "Junior ML"
    - "Graduate"
    - "Associate"
  negative:
    # We're junior-friendly — only block roles that don't fit the stack at all
    - "Senior Director"
    - "VP "
    - "Head of"
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby on Rails"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "Sales Engineer"  # confused with Solutions Engineer; remove if false negs
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # ============================================================
  # UAE-FIRST QUERIES (primary target market)
  # ============================================================

  # -- LinkedIn UAE-located AI/ML --
  - name: LinkedIn UAE — AI Engineer
    query: 'site:linkedin.com/jobs "AI Engineer" OR "Machine Learning Engineer" "Dubai" OR "Abu Dhabi" OR "United Arab Emirates"'
    enabled: true

  - name: LinkedIn UAE — LLM/Agentic
    query: 'site:linkedin.com/jobs "LLM" OR "Agentic" OR "GenAI" "Dubai" OR "Abu Dhabi" OR "UAE"'
    enabled: true

  - name: LinkedIn UAE — Applied AI / FDE
    query: 'site:linkedin.com/jobs "Applied AI" OR "Forward Deployed" OR "Solutions Engineer" "Dubai" OR "Abu Dhabi" OR "UAE"'
    enabled: true

  # -- Bayt + GulfTalent (UAE-native job boards) --
  - name: Bayt — AI/ML
    query: 'site:bayt.com "AI Engineer" OR "Machine Learning" OR "Data Scientist" UAE OR Dubai OR "Abu Dhabi"'
    enabled: true

  - name: GulfTalent — AI/ML
    query: 'site:gulftalent.com "AI" OR "Machine Learning" OR "LLM" Dubai OR "Abu Dhabi"'
    enabled: true

  - name: Naukrigulf — AI/ML
    query: 'site:naukrigulf.com "AI Engineer" OR "Machine Learning" UAE OR Dubai OR "Abu Dhabi"'
    enabled: true

  # -- Greenhouse / Ashby / Lever filtered to UAE --
  - name: Greenhouse — UAE
    query: 'site:job-boards.greenhouse.io OR site:boards.greenhouse.io "AI" OR "ML" OR "Engineer" "Dubai" OR "Abu Dhabi" OR "UAE"'
    enabled: true

  - name: Ashby — UAE
    query: 'site:jobs.ashbyhq.com "AI" OR "ML" OR "Engineer" "Dubai" OR "Abu Dhabi" OR "UAE"'
    enabled: true

  - name: Lever — UAE
    query: 'site:jobs.lever.co "AI" OR "ML" OR "Engineer" "Dubai" OR "Abu Dhabi" OR "UAE"'
    enabled: true

  - name: Workable — UAE
    query: 'site:apply.workable.com "AI" OR "ML" "Dubai" OR "Abu Dhabi" OR "UAE"'
    enabled: true

  # -- UAE govt & sovereign AI ecosystem (G42/Mubadala/etc.) --
  - name: G42 ecosystem
    query: '"G42" OR "Core42" OR "Inception" OR "Presight" "AI" OR "ML" jobs OR careers OR "Engineer"'
    enabled: true

  - name: UAE sovereign AI / govt
    query: '"Mubadala" OR "ADNOC" OR "EDGE" OR "TII" OR "Technology Innovation Institute" "AI" OR "ML" jobs OR careers'
    enabled: true

  # -- UAE startups (Careem, Tabby, Tamara, e&, etc.) --
  - name: UAE/MENA tech unicorns
    query: '"Careem" OR "Tabby" OR "Tamara" OR "noon" OR "Property Finder" "AI" OR "ML" OR "Engineer" jobs OR careers'
    enabled: true

  # -- DIFC/ADGM fintech UAE --
  - name: UAE fintech AI
    query: '"DIFC" OR "ADGM" OR "Dubai" "AI Engineer" OR "ML" fintech OR bank careers'
    enabled: true

  # ============================================================
  # GLOBAL REMOTE QUERIES (secondary — companies hiring remote
  # from anywhere, including UAE)
  # ============================================================

  - name: Ashby — AI Engineer (remote)
    query: 'site:jobs.ashbyhq.com "AI Engineer" OR "LLM Engineer" OR "Forward Deployed" remote'
    enabled: true

  - name: Ashby — Agentic (remote)
    query: 'site:jobs.ashbyhq.com "Agentic" OR "AI Agent" OR "Applied AI" remote'
    enabled: true

  - name: Greenhouse — AI Engineer (remote)
    query: 'site:job-boards.greenhouse.io "AI Engineer" OR "LLM" OR "Agentic" remote'
    enabled: true

  - name: Greenhouse — FDE / Solutions (remote)
    query: 'site:job-boards.greenhouse.io "Solutions Architect" OR "Forward Deployed" AI remote'
    enabled: true

  - name: Lever — AI roles (remote)
    query: 'site:jobs.lever.co "AI Engineer" OR "Agentic" OR "LLMOps" remote'
    enabled: true

  - name: Wellfound — AI engineer (remote)
    query: 'site:wellfound.com "AI Engineer" OR "ML Engineer" OR "Applied AI" remote'
    enabled: true

  - name: FDE & Deployed Engineer — All portals
    query: '"Forward Deployed Engineer" OR "Deployed Engineer" AI site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com OR site:jobs.lever.co'
    enabled: true

  - name: RemoteFront — AI & Automation
    query: 'site:remotefront.com "AI Engineer" OR "ML Engineer" OR "Applied AI" remote'
    enabled: true

